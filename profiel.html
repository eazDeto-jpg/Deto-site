<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mijn profiel — Deto</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="deto-logo.png">
<link rel="stylesheet" href="style.css">
<style>
  body { background: #F8FAFC; min-height: 100vh; display: flex; flex-direction: column; }

  /* PROFILE HERO */
  .profile-hero {
    background: white;
    border-bottom: 1px solid #E5E7EB;
    padding: 36px 24px 36px;
    display: none;
  }
  .profile-hero.visible { display: block; }
  .profile-hero-inner {
    max-width: 720px; margin: 0 auto;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  .profile-hero-avatar-big {
    width: 68px; height: 68px; flex-shrink: 0;
    background: linear-gradient(135deg, #22C55E, #16A34A);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 900; color: white;
    box-shadow: 0 4px 16px rgba(34,197,94,0.25);
  }
  .profile-hero-text { flex: 1; min-width: 200px; }
  .profile-hero-name { font-size: 22px; font-weight: 900; color: #0F172A; letter-spacing: -0.5px; }
  .profile-hero-email { font-size: 13px; color: #9CA3AF; margin-top: 3px; }
  .profile-hero-badges { display: flex; gap: 28px; margin-top: 14px; }
  .profile-hero-badge-stat strong { display: block; font-size: 20px; font-weight: 900; color: #0F172A; letter-spacing: -0.5px; }
  .profile-hero-badge-stat span { font-size: 11px; color: #9CA3AF; text-transform: uppercase; letter-spacing: 1px; }

  .btn-book {
    background: #22C55E; color: white; border: none; padding: 10px 20px;
    border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: inherit; text-decoration: none; display: inline-block; transition: background 0.2s;
  }
  .btn-book:hover { background: #16A34A; }
  main { flex: 1; max-width: 720px; width: 100%; margin: 0 auto; padding: 28px 24px 64px; }

  /* Loading */
  #state-loading { text-align: center; padding: 80px 0; color: #9CA3AF; font-size: 16px; }
  .spinner-big { display: inline-block; width: 36px; height: 36px; border: 3px solid #E5E7EB; border-radius: 50%; border-top-color: #22C55E; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Profile card */
  .profile-card {
    background: white; border-radius: 20px; padding: 28px 32px;
    border: 1px solid #E5E7EB; margin-bottom: 32px;
    display: flex; align-items: center; gap: 20px;
  }
  .avatar {
    width: 64px; height: 64px; background: #DCFCE7; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 900; color: #16A34A; flex-shrink: 0;
  }
  .profile-info h2 { font-size: 20px; font-weight: 900; margin-bottom: 4px; }
  .profile-info p { font-size: 14px; color: #6B7280; }

  /* Section header */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 12px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: #9CA3AF;
  }
  .section-count {
    font-size: 12px; font-weight: 600; color: #9CA3AF;
    background: #F3F4F6; padding: 3px 10px; border-radius: 100px;
  }

  /* Booking card */
  .booking-card {
    background: white; border-radius: 16px;
    border: 1px solid #E5E7EB; margin-bottom: 12px;
    overflow: hidden; transition: box-shadow 0.2s;
  }
  .booking-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
  .booking-card-top {
    padding: 20px 24px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
  }
  .booking-left { flex: 1; }
  .booking-dienst { font-size: 16px; font-weight: 800; margin-bottom: 8px; color: #111827; }
  .booking-meta { display: flex; flex-wrap: wrap; gap: 12px; }
  .booking-meta-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 13px; color: #6B7280;
  }
  .booking-meta-item svg { flex-shrink: 0; }
  .booking-right { text-align: right; flex-shrink: 0; }
  .booking-total { font-size: 22px; font-weight: 900; color: #22C55E; }
  .booking-status {
    display: inline-block; font-size: 11px; font-weight: 700; padding: 4px 10px;
    border-radius: 100px; margin-top: 6px;
  }
  .status-upcoming { background: #DCFCE7; color: #16A34A; }
  .status-past { background: #F3F4F6; color: #9CA3AF; }

  .booking-card-footer {
    border-top: 1px solid #F3F4F6;
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .booking-adres { font-size: 13px; color: #6B7280; display: flex; align-items: center; gap: 6px; }
  .cancel-btn {
    font-size: 12px; font-weight: 600; color: #EF4444;
    background: none; border: none; cursor: pointer; font-family: inherit;
    padding: 4px 0; text-decoration: none;
  }
  .cancel-btn:hover { text-decoration: underline; }

  /* Empty state */
  .empty-state {
    background: white; border-radius: 20px; padding: 64px 32px;
    border: 1px solid #E5E7EB; text-align: center;
  }
  .empty-icon { font-size: 52px; margin-bottom: 20px; }
  .empty-state h3 { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
  .empty-state p { color: #6B7280; font-size: 14px; margin-bottom: 28px; line-height: 1.6; }

  /* Edit form */
  .edit-card {
    background: white; border-radius: 20px; border: 1px solid #E5E7EB;
    margin-bottom: 32px; overflow: hidden;
  }
  .edit-card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 28px; cursor: pointer; user-select: none;
  }
  .edit-card-header:hover { background: #FAFAFA; }
  .edit-card-title { font-size: 15px; font-weight: 700; color: #111827; display: flex; align-items: center; gap: 10px; }
  .edit-card-title span { font-size: 18px; }
  .edit-toggle-btn {
    font-size: 13px; font-weight: 600; color: #22C55E;
    background: #F0FDF4; border: none; padding: 6px 14px; border-radius: 8px;
    cursor: pointer; font-family: inherit; transition: background 0.2s;
  }
  .edit-toggle-btn:hover { background: #DCFCE7; }
  .edit-form-body { padding: 0 28px 28px; display: none; }
  .edit-form-body.open { display: block; }
  .edit-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .edit-field { display: flex; flex-direction: column; gap: 6px; }
  .edit-field.full { grid-column: 1 / -1; }
  .edit-field label { font-size: 13px; font-weight: 600; color: #374151; }
  .edit-field input {
    padding: 10px 14px; border: 1.5px solid #E5E7EB; border-radius: 10px;
    font-size: 14px; font-family: inherit; color: #111827; background: #F9FAFB;
    transition: border-color 0.2s;
  }
  .edit-field input:focus { outline: none; border-color: #22C55E; background: white; }
  .edit-field input[readonly] { color: #9CA3AF; cursor: not-allowed; }
  .edit-divider { border: none; border-top: 1px solid #F3F4F6; margin-bottom: 20px; }
  .edit-save-btn {
    background: #22C55E; color: white; border: none; padding: 12px 28px;
    border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: inherit; transition: background 0.2s;
  }
  .edit-save-btn:hover { background: #16A34A; }
  .edit-save-btn:disabled { background: #9CA3AF; cursor: not-allowed; }
  .edit-feedback { font-size: 13px; margin-top: 12px; display: none; padding: 10px 14px; border-radius: 8px; }
  .edit-feedback.success { background: #DCFCE7; color: #16A34A; display: block; }
  .edit-feedback.error { background: #FEE2E2; color: #DC2626; display: block; }

  /* Stats row */
  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px;
  }
  .stat-card {
    background: white; border-radius: 14px; padding: 18px 20px;
    border: 1px solid #E5E7EB; text-align: center;
  }
  .stat-value { font-size: 24px; font-weight: 900; color: #111827; }
  .stat-label { font-size: 12px; color: #9CA3AF; margin-top: 4px; font-weight: 500; }

  @media (max-width: 600px) {
    .booking-card-top { flex-direction: column; }
    .booking-right { text-align: left; }
    .profile-card { padding: 20px; }
    .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-card { padding: 14px 10px; }
    .stat-value { font-size: 20px; }
  }
</style>
</head>

    <!-- Profile header (hidden — replaced by dark hero) -->
    <div class="profile-card" style="display:none;">
      <div class="avatar" id="avatar-letter">?</div>

    <!-- Edit gegevens -->
    <div class="edit-card">
      <div class="edit-card-header" onclick="toggleEditForm()">
        <div class="edit-card-title"><span>✏️</span> Mijn gegevens wijzigen</div>

      <div class="edit-form-body" id="edit-form-body">

          <div class="edit-field">

<script>
  const SUPABASE_URL = 'https://clvbgogcsmpszhdvhqyv.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsdmJnb2djc21wc3poZHZocXl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDg2OTEsImV4cCI6MjA5MDgyNDY5MX0.SOIRnPdiDr04OebiQyY_IE1ViP9gW6C4xTNgwr14xk4';
  let sb = null;

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      if (document.querySelector('script[src="' + src + '"]')) { resolve(); return; }
      const s = document.createElement('script');
      s.src = src; s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  function formatDate(dateStr) {
    return new Date(dateStr + 'T00:00:00').toLocaleDateString('nl-BE', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
  }

  function isUpcoming(dateStr) {
    return dateStr >= new Date().toISOString().split('T')[0];
  }

  async function init() {
    // Check localStorage for customer data
    const customerNaam = localStorage.getItem('deto_customer_naam') || 'Deto Klant';
    const customerEmail = localStorage.getItem('deto_customer_id') || 'klant@example.com';
    const token = localStorage.getItem('deto_customer_token');
    
    if (!token) {
      window.location.replace('login.html?redirect=profiel.html');
      return;
    }

    // Mock data for profile
    const voornaam = customerNaam.split(' ')[0] || '';
    const achternaam = customerNaam.split(' ').slice(1).join(' ') || '';
    const naam = customerNaam;
    const result = {
      email: customerEmail,
      user_metadata: { voornaam, achternaam },
      bookings: [
        { id: 1, dienst: 'Basis wash', datum: '2026-04-15', adres: 'Gent', totaal: 35, afgerond: false },
        { id: 2, dienst: 'Premium detail', datum: '2026-04-10', adres: 'Gent', totaal: 75, afgerond: true }
      ]
    };

    document.getElementById('profile-name').textContent = naam;
    document.getElementById('profile-email').textContent = result.email;
    document.getElementById('avatar-letter').textContent = (voornaam || result.email).charAt(0).toUpperCase();

    // Fill dark hero banner
    const letter = (voornaam || result.email).charAt(0).toUpperCase();
    document.getElementById('hero-avatar-letter').textContent = letter;
    document.getElementById('hero-name').textContent = naam;
    document.getElementById('hero-email').textContent = result.email;
    document.getElementById('profile-hero').classList.add('visible');

    // Pre-fill edit form
    document.getElementById('edit-voornaam').value = voornaam;
    document.getElementById('edit-achternaam').value = achternaam;
    document.getElementById('edit-telefoon').value = meta.telefoon || '';
    document.getElementById('edit-adres').value = meta.adres || '';
    document.getElementById('edit-email').value = result.email;

    document.getElementById('state-loading').style.display = 'none';
    document.getElementById('state-content').style.display = 'block';

    const boekingen = result.bookings || [];

    // Stats
    const upcoming = boekingen.filter(b => !b.afgerond).length;
    const spent = boekingen.filter(b => b.afgerond).reduce((s, b) => s + (b.totaal || 0), 0);
    // Update hero stats
    document.getElementById('hero-stat-bookings').textContent = boekingen.length;
    document.getElementById('hero-stat-total').textContent = '€' + spent;
    document.getElementById('hero-stat-upcoming').textContent = upcoming;

    if (boekingen.length > 0) {
      document.getElementById('stat-total').textContent = boekingen.length;
      document.getElementById('stat-upcoming').textContent = upcoming;
      document.getElementById('stat-spent').textContent = '€' + spent;
      document.getElementById('stats-row').style.display = 'grid';
      document.getElementById('booking-count').textContent = boekingen.length;
      document.getElementById('booking-count').style.display = 'inline-block';
    }

    const container = document.getElementById('bookings-container');

    if (boekingen.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🚗</div>
          <h3>Nog geen boekingen</h3>
          <p>Je hebt nog geen autodetailing gepland.<br>Boek nu je eerste beurt!</p>
          <a href="boeken.html" class="btn-book" style="display:inline-block;">Eerste beurt boeken →</a>
        </div>`;
      return;
    }

    container.innerHTML = '';
    boekingen.forEach(b => {
      const upcoming = !b.afgerond;
      const card = document.createElement('div');
      card.className = 'booking-card';
      card.innerHTML = `
        <div class="booking-card-top">
          <div class="booking-left">
            <div class="booking-dienst">${b.dienst} — ${b.auto_type}</div>
            <div class="booking-meta">
              <span class="booking-meta-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                ${formatDate(b.datum)}
              </span>
              <span class="booking-meta-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                ${b.tijdstip}
              </span>
            </div>
          </div>
          <div class="booking-right">
            <div class="booking-total">€${b.totaal}</div>
            <span class="booking-status ${upcoming ? 'status-upcoming' : 'status-past'}">
              ${upcoming ? 'Gepland' : 'Voltooid'}
            </span>
          </div>
        </div>
        ${b.adres ? `
        <div class="booking-card-footer">
          <span class="booking-adres">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${b.adres}
          </span>
          ${upcoming ? `<a href="annuleer.html?id=${b.id}" class="cancel-btn">Annuleren</a>` : ''}
        </div>` : upcoming ? `
        <div class="booking-card-footer" style="justify-content:flex-end;">
          <a href="annuleer.html?id=${b.id}" class="cancel-btn">Annuleren</a>
        </div>` : ''}`;
      container.appendChild(card);
    });
  }

  function toggleEditForm() {
    const body = document.getElementById('edit-form-body');
    const btn = document.getElementById('edit-toggle-btn');
    const open = body.classList.toggle('open');
    btn.textContent = open ? 'Sluiten' : 'Bewerken';
  }

  async function saveGegevens() {
    const voornaam = document.getElementById('edit-voornaam').value.trim();
    const achternaam = document.getElementById('edit-achternaam').value.trim();
    const telefoon = document.getElementById('edit-telefoon').value.trim();
    const adres = document.getElementById('edit-adres').value.trim();
    const btn = document.getElementById('edit-save-btn');
    const feedback = document.getElementById('edit-feedback');

    if (!voornaam || !achternaam) {
      feedback.textContent = '⚠️ Voornaam en achternaam zijn verplicht.';
      feedback.className = 'edit-feedback error';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Opslaan…';
    feedback.className = 'edit-feedback';

    try {
      const { error } = await sb.auth.updateUser({
        data: { voornaam, achternaam, telefoon, adres }
      });
      if (error) throw error;

      // Update visible name + avatar
      const naam = (voornaam + ' ' + achternaam).trim();
      document.getElementById('profile-name').textContent = naam;
      document.getElementById('avatar-letter').textContent = voornaam.charAt(0).toUpperCase();

      feedback.textContent = '✅ Gegevens opgeslagen!';
      feedback.className = 'edit-feedback success';
    } catch (err) {
      feedback.textContent = '⚠️ Fout bij opslaan: ' + (err.message || 'probeer opnieuw');
      feedback.className = 'edit-feedback error';
    }

    btn.disabled = false;
    btn.textContent = 'Opslaan';
  }

  async function doLogout() {
    if (!sb) {
      await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2');
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
    await sb.auth.signOut();
    window.location.replace('deto-homepage.html');
  }

  init();
</script>

    const navItem = document.getElementById('nav-auth-item');
    if (navItem) {
      navItem.innerHTML = `<div class="nav-user-wrap" id="nav-user-wrap"><div class="nav-user-btn" onclick="toggleUserMenu(event)"><div class="nav-user-avatar">${letter}</div>${voornaam} ▾</div><div class="nav-user-dropdown" id="nav-user-dropdown"><a href="profiel.html">👤 Mijn profiel</a><a href="boeken.html">+ Nieuw boeken</a><button onclick="doLogout()">Uitloggen ↩</button></div></div>`;
    }
    const mobileLink = document.getElementById('mobile-auth-link');
    if (mobileLink) {
      mobileLink.textContent = '👤 ' + voornaam + ' — Mijn profiel';
      mobileLink.href = 'profiel.html';
    }
  })();
  function toggleUserMenu(e) {
    e.stopPropagation();
    const dd = document.getElementById('nav-user-dropdown');
    if (dd) dd.classList.toggle('open');
  }
  document.addEventListener('click', function() {
    const dd = document.getElementById('nav-user-dropdown');
    if (dd) dd.classList.remove('open');
  });
</script>

</body>
</html>
