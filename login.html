<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inloggen — Deto</title>
<link rel="icon" type="image/png" href="deto-logo.png">
<link rel="stylesheet" href="style.css">
<style>
  body { background: #F8FAFC; min-height: 100vh; display: flex; flex-direction: column; }
  .auth-split { flex: 1; display: grid; grid-template-columns: 1fr 1fr; min-height: calc(100vh - 88px); }
  .auth-left { background: #111827; padding: 60px 56px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
  .auth-left::before { content: ''; position: absolute; top: -80px; right: -80px; width: 320px; height: 320px; background: radial-gradient(circle, rgba(34,197,94,0.18) 0%, transparent 70%); pointer-events: none; }
  .auth-left::after { content: ''; position: absolute; bottom: -100px; left: -60px; width: 280px; height: 280px; background: radial-gradient(circle, rgba(34,197,94,0.08) 0%, transparent 70%); pointer-events: none; }
  .auth-brand { position: relative; z-index: 1; }
  .auth-brand-name { font-size: 28px; font-weight: 900; color: white; letter-spacing: -0.5px; }
  .auth-brand-name span { color: #22C55E; }
  .auth-brand-tagline { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 4px; }
  .auth-hero-text { position: relative; z-index: 1; }
  .auth-hero-text h2 { font-size: 36px; font-weight: 900; color: white; line-height: 1.15; letter-spacing: -1px; margin-bottom: 16px; }
  .auth-hero-text h2 em { color: #22C55E; font-style: normal; }
  .auth-hero-text p { font-size: 15px; color: rgba(255,255,255,0.5); line-height: 1.6; }
  .auth-right { background: white; padding: 60px 56px; display: flex; flex-direction: column; justify-content: center; }
  .card-title { font-size: 24px; font-weight: 900; margin-bottom: 6px; color: #111827; }
  .card-sub { font-size: 14px; color: #6B7280; margin-bottom: 28px; }
  .tabs { display: flex; border: 1px solid #E5E7EB; border-radius: 12px; padding: 4px; margin-bottom: 28px; background: #F9FAFB; }
  .tab { flex: 1; text-align: center; padding: 10px; border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer; color: #6B7280; transition: all 0.2s; user-select: none; }
  .tab.active { background: white; color: #111827; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151; }
  .field input { width: 100%; padding: 12px 14px; border: 1.5px solid #E5E7EB; border-radius: 10px; font-size: 15px; font-family: inherit; color: #111827; background: white; transition: border-color 0.2s; outline: none; box-sizing: border-box; }
  .field input:focus { border-color: #22C55E; }
  .btn-submit { width: 100%; padding: 12px; background: #22C55E; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.2s; }
  .btn-submit:hover { background: #16A34A; }
  .btn-submit:disabled { background: #9CA3AF; cursor: not-allowed; }
  .error { color: #EF4444; font-size: 13px; margin-bottom: 16px; display: none; }
  .success { color: #22C55E; font-size: 13px; margin-bottom: 16px; display: none; }
  @media (max-width: 768px) {
    .auth-split { grid-template-columns: 1fr; }
    .auth-left { display: none; }
    .auth-right { padding: 40px 24px; }
  }
</style>
</head>
<body>

<div class="auth-split">
  <div class="auth-left">
    <div class="auth-brand">
      <div class="auth-brand-name"><span>Deto</span></div>
      <div class="auth-brand-tagline">Autodetailing aan huis — Gent</div>
    </div>
    <div class="auth-hero-text">
      <h2>Jouw auto <em>blinkend schoon</em> — zonder gedoe</h2>
      <p>Boek in 2 minuten. Een detailer komt naar jou. Betaal achteraf.</p>
    </div>
  </div>

  <div class="auth-right">
    <div class="card-title">Welkom bij Deto</div>
    <div class="card-sub">Log in of maak een account aan om te boeken.</div>

    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Inloggen</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">Aanmelden</div>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form" style="display: block;">
      <div class="error" id="login-error"></div>
      <div class="field">
        <label>E-mailadres</label>
        <input type="email" id="login-email" placeholder="jan@email.be">
      </div>
      <div class="field">
        <label>Wachtwoord</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn-submit" id="btn-login" onclick="doLogin()">Inloggen</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-form" style="display: none;">
      <div class="error" id="register-error"></div>
      <div class="field">
        <label>Voornaam</label>
        <input type="text" id="reg-voornaam" placeholder="Jan">
      </div>
      <div class="field">
        <label>Achternaam</label>
        <input type="text" id="reg-achternaam" placeholder="Jansen">
      </div>
      <div class="field">
        <label>E-mailadres</label>
        <input type="email" id="reg-email" placeholder="jan@email.be">
      </div>
      <div class="field">
        <label>Wachtwoord</label>
        <input type="password" id="reg-password" placeholder="••••••••">
      </div>
      <button class="btn-submit" id="btn-register" onclick="doRegister()">Account aanmaken</button>
    </div>

    <div style="text-align: center; margin-top: 20px;">
      <a href="deto-homepage.html" style="color: #6B7280; text-decoration: none; font-size: 13px;">← Terug naar home</a>
    </div>
  </div>
</div>

<script>
  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('btn-login');

    if (!email || !password) {
      errorEl.textContent = '❌ Vul e-mailadres en wachtwoord in.';
      errorEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Bezig met inloggen...';
    errorEl.style.display = 'none';

    try {
      const res = await fetch('/api/customer-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok || !data.success) {
        throw new Error(data.error || 'Inloggen mislukt');
      }

      // Store session in localStorage (Supabase v2 format for compatibility)
      const KEY = 'sb-clvbgogcsmpszhdvhqyv-auth-token';
      localStorage.setItem(KEY, JSON.stringify(data.session));
      
      // Also store simple fields for easy access
      localStorage.setItem('deto_customer_id', data.user.id);
      localStorage.setItem('deto_customer_naam', (data.user.user_metadata && data.user.user_metadata.full_name) || data.user.email);

      window.location.href = 'profiel.html';
    } catch (err) {
      errorEl.textContent = '❌ ' + err.message;
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Inloggen';
    }
  }

  async function doRegister() {
    const voornaam = document.getElementById('reg-voornaam').value.trim();
    const achternaam = document.getElementById('reg-achternaam').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const errorEl = document.getElementById('register-error');
    const btn = document.getElementById('btn-register');

    if (!voornaam || !achternaam || !email || !password) {
      errorEl.textContent = '❌ Vul alle velden in.';
      errorEl.style.display = 'block';
      return;
    }

    if (password.length < 6) {
      errorEl.textContent = '❌ Wachtwoord moet minstens 6 tekens zijn.';
      errorEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Account aanmaken...';
    errorEl.style.display = 'none';

    try {
      const res = await fetch('/api/customer-login?action=register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, voornaam, achternaam })
      });

      const data = await res.json();

      if (!res.ok || !data.success) {
        throw new Error(data.error || 'Registratie mislukt');
      }

      // Store session
      const KEY = 'sb-clvbgogcsmpszhdvhqyv-auth-token';
      localStorage.setItem(KEY, JSON.stringify(data.session));
      
      localStorage.setItem('deto_customer_id', data.user.id);
      localStorage.setItem('deto_customer_naam', voornaam + ' ' + achternaam);

      window.location.href = 'profiel.html';
    } catch (err) {
      errorEl.textContent = '❌ ' + err.message;
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Account aanmaken';
    }
  }

  // Check if already logged in
  window.addEventListener('DOMContentLoaded', function() {
    const KEY = 'sb-clvbgogcsmpszhdvhqyv-auth-token';
    const session = localStorage.getItem(KEY);
    if (session) {
      window.location.href = 'profiel.html';
    }
  });
</script>

</body>
</html>
